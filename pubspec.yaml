name: opentelemetry
version: 0.18.10
description: A framework for collecting OpenTelemetry traces from applications.
homepage: https://github.com/Workiva/opentelemetry-dart
environment:
  sdk: ^3.4.0

dependencies:
  async: ^2.10.0
  collection: ^1.17.0
  fixnum: '>=1.1.0 <2.0.0'
  http: '>=0.13.0 <2.0.0'
  logging: ^1.0.0
  meta: '>=1.9.1 <2.0.0'
  protobuf: ">=3.0.0 <7.0.0"
  quiver: '>=3.0.0 <4.0.0'
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.3.3
  build_test: ">=2.2.1 <4.0.0"
  build_web_compilers: '>=3.2.7 <5.0.0'
  mocktail: ^1.0.3
  remove_from_coverage: ^2.0.0
  test: ^1.24.2
  workiva_analysis_options: ^1.2.2
